version: "3.8"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: openresty-gw:latest
    container_name: openresty-gw
    ports:
      - "8080:8080"
    environment:
      - ZERION_API_KEY=${ZERION_API_KEY:-test_zerion_key}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-test_coingecko_key}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY:-test_alchemy_key}
    volumes:
      - ./logs:/usr/local/openresty/nginx/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3