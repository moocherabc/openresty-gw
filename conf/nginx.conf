# ============================================================
# OneKey API Gateway — nginx.conf
# ============================================================

worker_processes auto;
error_log /dev/stderr info;
pid       logs/nginx.pid;

env ZERION_API_KEY;
env COINGECKO_API_KEY;
env ALCHEMY_API_KEY;
env GW_CONFIG_PATH;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/json;

    # ──────── 共享内存字典 ────────
    lua_shared_dict gw_metrics  10m;
    lua_shared_dict gw_limiter  10m;
    lua_shared_dict gw_circuit  5m;
    lua_shared_dict gw_config   5m;
    lua_shared_dict gw_locks    1m;

    # ──────── Lua 模块路径 ────────
    lua_package_path  "$prefix/lua/?.lua;$prefix/lua/?/init.lua;$prefix/lualib/?.lua;;";
    lua_package_cpath "$prefix/lualib/?.dll;$prefix/lualib/?.so;;";

    # ──────── 全局初始化 ────────
    init_by_lua_file       lua/init.lua;
    init_worker_by_lua_file lua/init_worker.lua;

    # ──────── DNS 解析器 ────────
    resolver 8.8.8.8 114.114.114.114 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ──────── 通用代理参数 ────────
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_buffering    on;
    proxy_buffer_size  16k;
    proxy_buffers      4 32k;

    # ──────── SSL 代理参数 ────────
    proxy_ssl_server_name   on;
    proxy_ssl_protocols     TLSv1.2 TLSv1.3;

    # ──────── 通用超时 ────────
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ──────── 通用重试策略 ────────
    proxy_next_upstream       error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries     2;
    proxy_next_upstream_timeout  10s;

    # ──────── 访问日志（结构化 JSON → stdout，Docker 兼容） ────────
    log_format gw_json escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"type":"access",'
        '"request_id":"$request_id",'
        '"provider":"$provider",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"args":"$args",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_length":$request_length,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /dev/stdout gw_json;

    # ============================================================
    # Upstream 定义
    # ============================================================
    upstream zerion_backend {
        server api.zerion.io:443;
        keepalive 32;
        keepalive_timeout 60s;
    }

    upstream coingecko_backend {
        server api.coingecko.com:443;
        keepalive 32;
        keepalive_timeout 60s;
    }

    upstream alchemy_backend {
        server eth-mainnet.g.alchemy.com:443;
        keepalive 32;
        keepalive_timeout 60s;
    }

    # ============================================================
    # 主 Server 块
    # ============================================================
    server {
        listen 8080;
        server_name _;

        # 全局变量默认值（供 log_format 使用）
        set $provider '-';

        # ──── 健康检查端点 ────
        location = /health {
            access_log off;
            content_by_lua_block {
                local cjson = require("cjson.safe")
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({status = "ok", version = "1.0.0"}))
            }
        }

        # ──── Prometheus 指标端点 ────
        location = /metrics {
            access_log off;
            content_by_lua_block {
                local metrics = require("metrics")
                metrics.expose()
            }
        }

        # ============================================================
        # Provider 代理路由
        # ============================================================

        # ──── Zerion: Basic Auth ────
        location ~ ^/zerion/(.*) {
            set $provider 'zerion';

            access_by_lua_file       lua/access.lua;
            header_filter_by_lua_file lua/header_filter.lua;
            body_filter_by_lua_file   lua/body_filter.lua;
            log_by_lua_file           lua/log.lua;

            proxy_ssl_name api.zerion.io;                      # 用于证书验证
            proxy_set_header Host api.zerion.io;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_pass https://zerion_backend/$1$is_args$args;
        }

        # ──── CoinGecko: Header Auth ────
        location ~ ^/coingecko/(.*) {
            set $provider 'coingecko';

            access_by_lua_file       lua/access.lua;
            header_filter_by_lua_file lua/header_filter.lua;
            body_filter_by_lua_file   lua/body_filter.lua;
            log_by_lua_file           lua/log.lua;

            proxy_ssl_name api.coingecko.com;
            proxy_set_header Host api.coingecko.com;
            proxy_set_header Connection "";
            proxy_pass https://coingecko_backend/$1$is_args$args;
        }

        # ──── Alchemy: URL Path Auth ────
        location ~ ^/alchemy/(.*) {
            set $provider 'alchemy';

            access_by_lua_file       lua/access.lua;
            header_filter_by_lua_file lua/header_filter.lua;
            body_filter_by_lua_file   lua/body_filter.lua;
            log_by_lua_file           lua/log.lua;

            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_ssl_name eth-mainnet.g.alchemy.com;
            proxy_set_header Host eth-mainnet.g.alchemy.com;
            proxy_set_header Connection "";

            set $backend_uri '';
            proxy_pass https://alchemy_backend$backend_uri;
        }

        # ──── 配置热更新端点（仅本机） ────
        location = /admin/reload {
            allow 127.0.0.1;
            deny all;
            content_by_lua_block {
                local config = require("config")
                local ok, err = config.reload()
                if ok then
                    ngx.say('{"status":"reloaded"}')
                else
                    ngx.status = 500
                    ngx.say('{"error":"' .. (err or "unknown") .. '"}')
                end
            }
        }

        # ──── 路由模块状态查询 ────
        location = /admin/router/status {
            content_by_lua_block {
                local status = require("gateway.router.status")
                status.handle()
            }
        }

        # ──── 路由模块健康检查 ────
        location = /admin/router/health {
            content_by_lua_block {
                local status = require("gateway.router.status")
                status.health_check()
            }
        }

        # ──── 监控模块状态查询 ────
        location = /admin/monitor/status {
            content_by_lua_block {
                local status = require("gateway.monitor.status")
                status.handle()
            }
        }

        # ──── 监控模块健康检查 ────
        location = /admin/monitor/health {
            content_by_lua_block {
                local status = require("gateway.monitor.status")
                status.health_check()
            }
        }

        # ──── 日志模块状态查询 ────
        location = /admin/logger/status {
            content_by_lua_block {
                local status = require("gateway.logger.status")
                status.handle()
            }
        }

        # ──── 日志模块健康检查 ────
        location = /admin/logger/health {
            content_by_lua_block {
                local status = require("gateway.logger.status")
                status.health_check()
            }
        }

        # ──── 稳定性模块聚合状态查询 ────
        location = /admin/stability/status {
            content_by_lua_block {
                local status = require("gateway.stability.status")
                status.handle()
            }
        }

        # ──── 稳定性模块聚合健康检查 ────
        location = /admin/stability/health {
            content_by_lua_block {
                local status = require("gateway.stability.status")
                status.health_check()
            }
        }

        # ──── 熔断器子模块状态查询 ────
        location = /admin/stability/circuit-breaker/status {
            content_by_lua_block {
                local status = require("gateway.stability.circuit_breaker.status")
                status.handle()
            }
        }

        # ──── 熔断器子模块调试接口 ────
        location = /admin/stability/circuit-breaker/debug {
            content_by_lua_block {
                local debug = require("gateway.stability.circuit_breaker.debug")
                debug.handle()
            }
        }

        # ──── 限流器子模块状态查询 ────
        location = /admin/stability/rate-limiter/status {
            content_by_lua_block {
                local status = require("gateway.stability.rate_limiter.status")
                status.handle()
            }
        }

        # ──── 限流器子模块调试接口 ────
        location = /admin/stability/rate-limiter/debug {
            content_by_lua_block {
                local debug = require("gateway.stability.rate_limiter.debug")
                debug.handle()
            }
        }

        # ──── 降级器子模块状态查询 ────
        location = /admin/stability/degradation/status {
            content_by_lua_block {
                local status = require("gateway.stability.degradation.status")
                status.handle()
            }
        }

        # ──── 降级器子模块调试接口 ────
        location = /admin/stability/degradation/debug {
            content_by_lua_block {
                local debug = require("gateway.stability.degradation.debug")
                debug.handle()
            }
        }

        # ──── 熔断器状态查询（兼容旧端点） ────
        location = /admin/circuit {
            content_by_lua_block {
                local cjson = require("cjson.safe")
                local cb = require("gateway.stability.circuit_breaker")
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(cb.get_all_info()))
            }
        }

        # ──── 默认 404 ────
        location / {
            return 404 '{"error":"not_found","message":"Unknown route"}';
        }
    }
}
